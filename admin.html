  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin — TELECOLA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --forest:#0b3d2e;--forest-mid:#144d3a;--forest-light:#1e6b50;
      --mint:#00c98a;--mint-soft:#e0f7ef;
      --cream:#f4f0e8;--white:#fff;
      --amber:#f59e0b;--amber-soft:#fef3c7;
      --red:#dc2626;--red-soft:#fee2e2;
      --text:#0c1f16;--text-2:#3a5445;--text-3:#7a9e8b;
      --border:rgba(11,61,46,.1);--border-2:rgba(11,61,46,.16);
      --shadow:0 2px 20px rgba(11,61,46,.08);--shadow-lg:0 8px 40px rgba(11,61,46,.13);
      --r:18px;--r-sm:11px;
    }
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
    canvas#admin-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4}


    /* ── LOGIN ── */
    #login-screen{position:fixed;inset:0;z-index:999;background:var(--forest);display:flex;align-items:center;justify-content:center}
    #login-screen.hidden{display:none}
    .login-box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:2.5rem 2rem;width:320px;text-align:center}
    .login-logo{margin-bottom:1.2rem}
    .login-title{font-family:'Bricolage Grotesque',sans-serif;font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:.3rem}
    .login-sub{font-size:.8rem;color:rgba(255,255,255,.4);margin-bottom:1.8rem}
    .login-input{width:100%;padding:12px 16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;margin-bottom:1rem;transition:border-color .2s}
    .login-input::placeholder{color:rgba(255,255,255,.3)}
    .login-input:focus{border-color:var(--mint)}
    .login-btn{width:100%;padding:12px;background:var(--mint);color:var(--forest);font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1rem;border:none;border-radius:10px;cursor:pointer;transition:opacity .2s}
    .login-btn:hover{opacity:.88}
    .login-error{color:#f87171;font-size:.8rem;margin-top:.6rem;min-height:1.2rem}
    /* ── TOPBAR ── */
    .topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;background:var(--forest);box-shadow:0 1px 0 rgba(255,255,255,.07)}
    .tb-logo{display:flex;align-items:center;gap:10px}
    .tb-logo-icon{width:38px;height:38px;border-radius:0;background:transparent;display:flex;align-items:center;justify-content:center}
    .tb-logo-icon svg{width:19px;height:19px;stroke:var(--forest);fill:none;stroke-width:2.5;stroke-linecap:round}
    .tb-logo-text{font-family:'Bricolage Grotesque',sans-serif;font-size:1.15rem;font-weight:700;color:#fff;letter-spacing:-.02em}
    .tb-logo-text span{color:var(--mint)}
    .tb-logo-sub{font-size:.72rem;color:rgba(255,255,255,.35);margin-left:6px;font-family:'DM Sans',sans-serif;font-weight:400}
    .tb-right{display:flex;align-items:center;gap:.8rem}
    .tb-badge{display:flex;align-items:center;gap:5px;background:rgba(0,201,138,.15);border:1px solid rgba(0,201,138,.25);border-radius:100px;padding:5px 12px;font-size:.72rem;font-weight:600;color:var(--mint)}
    .tb-dot{width:5px;height:5px;border-radius:50%;background:var(--mint);animation:pulse 1.6s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .tb-time{font-size:.8rem;color:rgba(255,255,255,.4);font-variant-numeric:tabular-nums}

    /* ── MAIN ── */
    .main{max-width:1260px;margin:0 auto;padding:2rem 2rem 4rem;position:relative;z-index:1}

    /* ── STAT CARDS ── */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:1.8rem}
    @media(max-width:860px){.stats-grid{grid-template-columns:1fr 1fr}}
    @media(max-width:480px){.stats-grid{grid-template-columns:1fr}}

    .stat-card{
      background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);
      padding:1.4rem 1.5rem;position:relative;overflow:hidden;
      transition:transform .2s,box-shadow .2s,border-color .2s;
      animation:fadeUp .5s ease both;
    }
    .stat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--border-2)}
    .stat-card::after{content:'';position:absolute;bottom:-30px;right:-30px;width:100px;height:100px;border-radius:50%;opacity:.06;pointer-events:none}
    .stat-card:nth-child(1)::after{background:var(--forest)}
    .stat-card:nth-child(2)::after{background:var(--amber)}
    .stat-card:nth-child(3)::after{background:var(--mint)}
    .stat-card:nth-child(4)::after{background:var(--red)}

    .stat-ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:1rem}
    .stat-ico svg{width:18px;height:18px;fill:none;stroke-width:2;stroke-linecap:round}
    .ico-green{background:var(--mint-soft)} .ico-green svg{stroke:var(--forest-light)}
    .ico-amber{background:var(--amber-soft)} .ico-amber svg{stroke:#92400e}
    .ico-mint{background:rgba(0,201,138,.15)} .ico-mint svg{stroke:var(--mint)}
    .ico-red{background:var(--red-soft)} .ico-red svg{stroke:var(--red)}

    .stat-val{font-family:'Bricolage Grotesque',sans-serif;font-size:2.2rem;font-weight:800;letter-spacing:-.04em;color:var(--text);line-height:1;margin-bottom:.3rem;transition:all .4s}
    .stat-label{font-size:.78rem;color:var(--text-3);font-weight:400}

    /* ── SECTION HEADER ── */
    .sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:.8rem}
    .sec-title{font-family:'Bricolage Grotesque',sans-serif;font-size:1.08rem;font-weight:700;color:var(--text)}
    .sec-sub{font-size:.78rem;color:var(--text-3);margin-top:2px}
    .refresh-btn{display:flex;align-items:center;gap:6px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:7px 14px;font-size:.8rem;color:var(--text-2);cursor:pointer;transition:border-color .2s,color .2s;font-family:'DM Sans',sans-serif}
    .refresh-btn:hover{border-color:var(--mint);color:var(--forest)}
    .refresh-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}

    /* ── TABLE CARD ── */
    .table-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
    .queue-table{width:100%;border-collapse:collapse}
    .queue-table thead tr{background:#1e6b50}
    .queue-table th{padding:13px 16px;text-align:left;font-size:.7rem;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:rgba(255,255,255,.8)}
    .queue-table tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
    .queue-table tbody tr:last-child{border-bottom:none}
    .queue-table tbody tr:hover{background:rgba(11,61,46,.025)}
    .queue-table td{padding:14px 16px;vertical-align:middle}

    .t-code{font-family:'Bricolage Grotesque',sans-serif;font-size:1.05rem;font-weight:700;color:var(--text)}
    .t-prio{display:inline-block;background:var(--amber-soft);color:#92400e;border:1px solid rgba(245,158,11,.3);font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:6px;margin-left:5px;vertical-align:middle}
    .t-doc{font-size:.88rem;color:var(--text);font-weight:500}
    .t-phone{font-size:.8rem;color:var(--text-3)}
    .t-med{font-size:.87rem;color:var(--text)}
    .t-conc{font-size:.75rem;color:var(--text-3)}

    .status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:.72rem;font-weight:600}
    .status-pill::before{content:'';width:6px;height:6px;border-radius:50%}
    .s-espera{background:var(--amber-soft);color:#92400e;border:1px solid rgba(245,158,11,.25)}
    .s-espera::before{background:var(--amber);animation:pulse 1.6s ease-in-out infinite}
    .s-atendiendo{background:var(--mint-soft);color:var(--forest-light);border:1px solid rgba(0,201,138,.25)}
    .s-atendiendo::before{background:var(--mint);animation:pulse 1s ease-in-out infinite}

    .actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
    .btn-a{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r-sm);font-size:.78rem;font-weight:600;cursor:pointer;border:none;transition:opacity .15s,transform .12s,filter .15s;font-family:'DM Sans',sans-serif}
    .btn-a:hover{opacity:.88;filter:brightness(1.06)}
    .btn-a:active{transform:scale(.95)}
    .btn-a svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round}
    .btn-call{background:var(--amber);color:#fff}
    .btn-done{background:var(--mint);color:var(--forest);font-weight:700}
    .btn-cancel{background:var(--red-soft);color:var(--red);border:1px solid rgba(220,38,38,.18)}

    /* Mobile cards */
    .mobile-cards{display:none}
    @media(max-width:700px){
      .queue-table{display:none}
      .mobile-cards{display:block}
    }
    .m-card{padding:1.2rem 1.4rem;border-bottom:1px solid var(--border)}
    .m-card:last-child{border-bottom:none}
    .m-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
    .m-card-btns{display:flex;gap:7px;flex-wrap:wrap}

    /* Empty state */
    .empty-state{padding:4rem 2rem;text-align:center}
    .empty-ico{font-size:2.6rem;margin-bottom:1rem}
    .empty-title{font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:var(--text-2);margin-bottom:.3rem}
    .empty-sub{font-size:.85rem;color:var(--text-3)}

    /* Toast */
    .toast{position:fixed;bottom:1.8rem;left:50%;transform:translateX(-50%) translateY(14px);background:var(--forest);color:#fff;border:1px solid rgba(255,255,255,.1);font-size:.85rem;font-weight:500;padding:11px 22px;border-radius:100px;box-shadow:var(--shadow-lg);z-index:999;opacity:0;white-space:nowrap;pointer-events:none;transition:opacity .3s,transform .3s}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>

        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div class="stat-val" id="st-espera">0</div>
      <div class="stat-label">En espera</div>
    </div>
    <div class="stat-card" style="animation-delay:.15s">
      <div class="stat-ico ico-mint">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.36 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.11 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 7A16 16 0 0 0 12 12.59a16 16 0 0 0 5.59-3.91l.36-.36a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 9.72v3.2"/></svg>
      </div>
      <div class="stat-val" id="st-aten">0</div>
      <div class="stat-label">Atendiendo</div>
    </div>
    <div class="stat-card" style="animation-delay:.2s">
      <div class="stat-ico ico-amber">
        <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </div>
      <div class="stat-val" id="st-prio">0</div>
      <div class="stat-label">Prioritarios</div>
    </div>
  </div>

  <!-- Table -->
  <div class="sec-hd">
    <div>
      <div class="sec-title">Cola activa del día</div>
      <div class="sec-sub" id="last-upd">Actualizando…</div>
    </div>
    <button class="refresh-btn" onclick="loadQueue()">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Actualizar
    </button>
  </div>

  <div class="table-card">
    <table class="queue-table">
      <thead><tr>
        <th>Turno</th><th>Documento</th><th>Teléfono</th>
        <th>Medicamento</th><th>Estado</th><th>Acciones</th>
      </tr></thead>
      <tbody id="admin-body"></tbody>
    </table>
    <div class="mobile-cards" id="admin-cards"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:8000/api'
  : `${window.location.origin}/api`;

/* Clock */
function updateClock(){
  document.getElementById('tb-clock').textContent =
    new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
}
updateClock(); setInterval(updateClock,1000);

/* Animated counter */
function animateVal(el, target){
  const start = parseInt(el.textContent)||0;
  if(start===target){return}
  const step = (target-start)/18;
  let cur=start, frames=0;
  const id=setInterval(()=>{
    cur+=step; frames++;
    el.textContent=Math.round(cur);
    if(frames>=18){el.textContent=target;clearInterval(id)}
  },22);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

let lastDataHash = '';

async function loadQueue(){
  try{
    const res=await fetch(`${API}/admin/turnos`);
    const data=await res.json();

    // Solo redibujar si los datos cambiaron
    const newHash = JSON.stringify(data.map(t=>({id:t.id,estado:t.estado})));
    const dataChanged = newHash !== lastDataHash;
    lastDataHash = newHash;

    animateVal(document.getElementById('st-total'),data.length);
    animateVal(document.getElementById('st-espera'),data.filter(t=>t.estado==='en_espera').length);
    animateVal(document.getElementById('st-aten'),data.filter(t=>t.estado==='atendiendo').length);
    animateVal(document.getElementById('st-prio'),data.filter(t=>t.codigo.startsWith('P-')).length);
    document.getElementById('last-upd').textContent='Última actualización: '+new Date().toLocaleTimeString('es-CO');

    // Si no cambiaron los datos no redibujar la tabla
    if(!dataChanged) return;

    const tbody=document.getElementById('admin-body');
    const cards=document.getElementById('admin-cards');

    if(!data.length){
      const empty=`<div class="empty-state"><div class="empty-ico">🌿</div><div class="empty-title">Sin turnos activos</div><div class="empty-sub">La cola está vacía en este momento</div></div>`;
      tbody.innerHTML=`<tr><td colspan="6">${empty}</td></tr>`;
      cards.innerHTML=empty; return;
    }

    tbody.innerHTML=data.map((t,i)=>{
      const isPrio=t.codigo.startsWith('P-');
      const isAten=t.estado==='atendiendo';
      const sc=isAten?'s-atendiendo':'s-espera';
      const st=isAten?'Atendiendo':'En espera';
      const btns=isAten
        ?`<button class="btn-a btn-done" onclick="doAction(${t.id},'completar')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Entregar</button>`
        :`<button class="btn-a btn-call" onclick="doAction(${t.id},'atender')"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07"/></svg>Llamar</button>`;
      return`<tr>
        <td><span class="t-code">${t.codigo}</span>${isPrio?'<span class="t-prio">PRIO</span>':''}</td>
        <td><span class="t-doc">${t.documento}</span></td>
        <td><span class="t-phone">${t.telefono||'—'}</span></td>
        <td><span class="t-med">${t.medicamento}</span><br><span class="t-conc">${t.concentracion}</span></td>
        <td><span class="status-pill ${sc}">${st}</span></td>
        <td><div class="actions">${btns}<button class="btn-a btn-cancel" onclick="cancelar(${t.id})"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Cancelar</button></div></td>
      </tr>`;
    }).join('');

    cards.innerHTML=data.map(t=>{
      const isPrio=t.codigo.startsWith('P-');
      const isAten=t.estado==='atendiendo';
      const sc=isAten?'s-atendiendo':'s-espera';
      const st=isAten?'Atendiendo':'En espera';
      const btns=isAten
        ?`<button class="btn-a btn-done" onclick="doAction(${t.id},'completar')">✅ Entregar</button>`
        :`<button class="btn-a btn-call" onclick="doAction(${t.id},'atender')">📢 Llamar</button>`;
      return`<div class="m-card">
        <div class="m-card-top">
          <div>
            <span class="t-code">${t.codigo}</span>${isPrio?'<span class="t-prio">PRIO</span>':''}
            <div class="t-doc" style="margin-top:3px">${t.documento}</div>
            <div class="t-conc">${t.medicamento} ${t.concentracion}</div>
          </div>
          <span class="status-pill ${sc}">${st}</span>
        </div>
        <div class="m-card-btns">${btns}<button class="btn-a btn-cancel" onclick="cancelar(${t.id})">✕ Cancelar</button></div>
      </div>`;
    }).join('');
  }catch(e){console.error(e)}
}

async function doAction(id,type){
  try{
    await fetch(`${API}/admin/turnos/${id}/${type}`,{method:'PUT'});
    showToast(type==='atender'?'📢 Turno llamado — correo enviado':'✅ Medicamento entregado');
    lastDataHash = ''; // forzar redibujado
    await loadQueue();
  }catch{showToast('❌ Error al ejecutar la acción')}
}

async function cancelar(id){
  await fetch(`${API}/admin/turnos/${id}`,{method:'DELETE'});
  showToast('🗑 Turno cancelado');
  lastDataHash = ''; // forzar redibujado
  await loadQueue();
}

setInterval(loadQueue,5000);
loadQueue();

/* Subtle animated background */
(function(){
  const canvas=document.getElementById('admin-bg');
  const ctx=canvas.getContext('2d');
  let W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  resize();
  window.addEventListener('resize',resize);
  let t=0;
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<4;i++){
      const x=W*(0.15+i*0.25)+Math.sin(t*.0008+i)*60;
      const y=H*.5+Math.cos(t*.0006+i)*80;
      const r=180+i*40;
      const g=ctx.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0,i%2===0?'rgba(0,201,138,.045)':'rgba(11,61,46,.03)');
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g;
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
    }
    t++;requestAnimationFrame(draw);
  }
  draw();
})();

  /* ── LOGIN ── */
  const ADMIN_PASS = 'telecola2024';
  function doLogin(){
    const p = document.getElementById('login-pass').value;
    if(p === ADMIN_PASS){
      document.getElementById('login-screen').classList.add('hidden');
      sessionStorage.setItem('tc_admin','1');
    } else {
      document.getElementById('login-error').textContent = 'Contraseña incorrecta';
      document.getElementById('login-pass').value = '';
      setTimeout(()=>document.getElementById('login-error').textContent='', 2000);
    }
  }
  // Si ya está autenticado en esta sesión, ocultar login
  if(sessionStorage.getItem('tc_admin')==='1'){
    document.getElementById('login-screen').classList.add('hidden');
  }

</script>
</body>
</html>
